<div id="equity" class="card p-6"
     hx-get="/fragment/equity" hx-trigger="every 120s" hx-swap="outerHTML"
     hx-vals='js:{"range": (window.__equityRange || "1m")}'>
  <div class="flex items-baseline justify-between flex-wrap gap-2">
    <div>
      <div class="label">Equity Curve</div>
      <h3 class="text-xl font-semibold mt-1">Recorded History</h3>
    </div>
    <div class="flex items-center gap-1 text-xs" id="equity-range">
      {% set ranges = [("1w","1W"),("1m","1M"),("3m","3M"),("ytd","YTD"),("all","All")] %}
      {% for key, label in ranges %}
      <button data-range="{{ key }}"
              class="range-btn px-2 py-1 rounded border {{ 'bg-cyan-500/15 border-cyan-500/40 text-cyan-300 active' if equity_range == key else 'border-slate-700 text-slate-400 hover:text-slate-200' }}">
        {{ label }}
      </button>
      {% endfor %}
    </div>
  </div>
  <div class="mt-4 h-64">
    <canvas id="equityChart"></canvas>
  </div>
  <div class="mt-4 h-32">
    <div class="text-[10px] uppercase tracking-wider text-slate-500 mb-1">Drawdown from peak</div>
    <canvas id="drawdownChart"></canvas>
  </div>
  <script>
    (function() {
      const points = {{ equity_points | tojson | safe }};
      window.__equityRange = "{{ equity_range }}";
      const root = document.getElementById("equity");
      if (!root) return;

      // Bind range buttons once per fragment swap.
      root.querySelectorAll(".range-btn").forEach(btn => {
        btn.addEventListener("click", (ev) => {
          ev.preventDefault();
          const r = btn.dataset.range;
          window.__equityRange = r;
          htmx.ajax("GET", "/fragment/equity?range=" + encodeURIComponent(r), {target: "#equity", swap: "outerHTML"});
        });
      });

      const eqEl = document.getElementById("equityChart");
      const ddEl = document.getElementById("drawdownChart");
      if (!eqEl || !points.length) {
        if (eqEl) eqEl.parentElement.innerHTML = '<div class="text-slate-500 text-sm italic h-full grid place-items-center">Waiting for ≥2 days of portfolio history.</div>';
        if (ddEl) ddEl.parentElement.style.display = "none";
        return;
      }
      const labels = points.map(p => new Date(p.ts).toLocaleDateString("en-US", { month: "short", day: "numeric" }));
      const data = points.map(p => Number(p.equity));

      // Drawdown series: percent from running peak.
      let peak = data[0];
      const dd = data.map(v => { peak = Math.max(peak, v); return peak > 0 ? ((v / peak) - 1) * 100 : 0; });

      try { const prior = Chart.getChart && Chart.getChart(eqEl); if (prior) prior.destroy(); } catch (e) {}
      try { const prior = Chart.getChart && Chart.getChart(ddEl); if (prior) prior.destroy(); } catch (e) {}

      new Chart(eqEl, {
        type: "line",
        data: { labels, datasets: [{
          label: "Equity ($)", data, borderColor: "#22d3ee", backgroundColor: "rgba(34,211,238,0.08)",
          fill: true, tension: 0.25, pointRadius: 0, pointHoverRadius: 5, borderWidth: 2,
        }]},
        options: {
          responsive: true, maintainAspectRatio: false,
          plugins: { legend: { display: false }, tooltip: { mode: "index", intersect: false } },
          scales: {
            x: { ticks: { color: "#475569", maxTicksLimit: 8 }, grid: { color: "rgba(30,41,59,0.5)" } },
            y: { ticks: { color: "#475569", callback: v => "$" + Number(v).toLocaleString() }, grid: { color: "rgba(30,41,59,0.5)" } }
          }
        }
      });
      new Chart(ddEl, {
        type: "line",
        data: { labels, datasets: [{
          label: "Drawdown (%)", data: dd, borderColor: "#f43f5e", backgroundColor: "rgba(244,63,94,0.12)",
          fill: true, tension: 0.25, pointRadius: 0, pointHoverRadius: 4, borderWidth: 1.5,
        }]},
        options: {
          responsive: true, maintainAspectRatio: false,
          plugins: { legend: { display: false }, tooltip: { mode: "index", intersect: false, callbacks: { label: ctx => ctx.parsed.y.toFixed(2) + "%" } } },
          scales: {
            x: { ticks: { color: "#475569", maxTicksLimit: 6 }, grid: { display: false } },
            y: { ticks: { color: "#475569", callback: v => v.toFixed(1) + "%" }, grid: { color: "rgba(30,41,59,0.5)" }, max: 0 }
          }
        }
      });
    })();
  </script>
</div>
