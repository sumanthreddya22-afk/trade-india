<div id="orders" class="card p-6"
     hx-get="/fragment/orders"
     hx-trigger="order.placed from:body, order.filled from:body, order.partial_fill from:body, order.canceled from:body, order.rejected from:body, position.changed from:body, every 120s"
     hx-swap="outerHTML">
  <div class="flex items-baseline justify-between">
    <div>
      <div class="label">Live Orders</div>
      <h3 class="text-xl font-semibold mt-1">Pending &amp; Working</h3>
    </div>
    <span class="text-xs text-slate-500">{{ s.orders|length }} open</span>
  </div>
  <div class="mt-4 max-h-96 overflow-y-auto scroll-thin">
    {% if s.orders %}
    <table class="w-full text-sm">
      <thead class="text-xs text-slate-500 uppercase tracking-wider sticky top-0 bg-slate-950/95">
        <tr>
          <th class="text-left py-2 pr-2">Symbol</th>
          <th class="text-left py-2 pr-2">Side</th>
          <th class="text-left py-2 pr-2">Qty</th>
          <th class="text-left py-2 pr-2">Type</th>
          <th class="text-left py-2">Status</th>
        </tr>
      </thead>
      <tbody class="divide-y divide-slate-800/60">
        {% for o in s.orders %}
        <tr class="pos-row">
          <td class="py-2 pr-2 font-mono">{{ o.symbol }}</td>
          <td class="py-2 pr-2 capitalize {{ 'text-emerald-400' if o.side == 'buy' else 'text-rose-400' }}">{{ o.side }}</td>
          <td class="py-2 pr-2">{{ o.qty }}</td>
          <td class="py-2 pr-2 text-slate-400">{{ o.order_type }}</td>
          <td class="py-2 text-slate-400">{{ o.status }}</td>
        </tr>
        {% endfor %}
      </tbody>
    </table>
    {% else %}
    <div class="text-sm text-slate-500 italic">No open orders.</div>
    {% endif %}
  </div>
</div>
