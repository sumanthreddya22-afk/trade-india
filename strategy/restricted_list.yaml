# strategy/restricted_list.yaml
#
# Symbols the bot is NEVER allowed to enter, even if signals approve and risk
# clears. Hard pre-trade compliance gate. Reasons: sanctions, delisted, admin
# block (e.g., known data quality issues), insider blackout, etc.
#
# Symbols use the same casing as the rest of the system (NVDA, AAPL, BTC/USD).
# Comments next to each symbol document why it's restricted; reviewable in
# git history.
#
# To add a symbol, append below `symbols:` with a one-line note. Reload is
# automatic on next daemon restart (the file is reread on every scan, no
# special "reload" step needed).

symbols: []
