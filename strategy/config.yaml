# strategy/config.yaml — non-secret runtime configuration

risk:
  daily_loss_limit_pct: 2.0          # halt trading if daily P&L < -2%
  weekly_loss_limit_pct: 5.0         # halt trading if weekly P&L < -5%
  per_trade_risk_pct: 1.0            # max account at risk per trade
  max_position_pct: 10.0             # no single position > 10% of account
  max_symbol_concentration_pct: 5.0  # max 5% in any one symbol
  max_consecutive_losing_days: 3     # 3 losers → reduce sizing 50%
  unprotected_stop_pct: 0.05            # protective stop for unprotected positions

allocation:
  options_max_pct: 20.0  # honored by wheel collateral gate
  # The three keys below are unused by current code (Bucket F dropped the
  # AllocationConfig fields), but kept here so a long-running pre-Bucket-F
  # dashboard / daemon process that's still validating them on every YAML
  # reload doesn't 500 the dashboard. Safe to delete after the daemon and
  # dashboard processes have been restarted on the new code.
  stocks_max_pct: 70.0
  crypto_max_pct: 30.0
  cash_floor_pct: 10.0

regime_allocations:
  trending_up:    {stocks: 60.0, crypto: 25.0, options: 15.0, cash: 0.0}
  trending_down:  {stocks: 30.0, crypto: 15.0, options: 10.0, cash: 45.0}
  sideways:       {stocks: 40.0, crypto: 20.0, options: 20.0, cash: 20.0}
  risk_off:       {stocks: 10.0, crypto: 5.0,  options: 0.0,  cash: 85.0}

email:
  to: bharath8887@gmail.com
  # Same Bucket F transitional note as `allocation` above. These keys are
  # unused by the new code; kept here only so a pre-Bucket-F process can
  # still validate the YAML during the rolling restart window.
  daily_summary_time_et: "16:30"
  weekly_summary_day: "Sunday"

storage:
  trade_journal_path: data/trade_journal.db

regime:
  vol_threshold_pct: 22.0   # 20d realized vol % above which we force risk_off (Phase 0b: was 30)

strategy:
  # News-sentiment floor (Plan 6c). When set, entries are skipped when the
  # symbol's most-recent cached Polygon sentiment score is below this value.
  # Range -1..+1. None = filter disabled.
  #
  # Active value: -0.5 (defensive — only blocks names where the average of
  # recent articles is majority-negative). passes_filter() returns True for
  # symbols with no news data, so coverage gaps don't block entries. Crypto
  # bypasses this gate entirely (Polygon news is equity-focused).
  #
  # This is NOT a backtest-validated value — it's a conservative defensive
  # gate while Plan 7 (composite signal aggregator) is built. Easy kill
  # switch: set to null to disable.
  sentiment_floor: -0.5
  sentiment_max_age_days: 3

  # ───────────────────────── Phase 6 ─────────────────────────
  # Pre-trade entry committee. When True, every BUY signal that survives
  # the deterministic risk gate fires a 4-LLM debate (mailbox-routed,
  # Claude Code subscription) before the order is placed. Fail-soft: a
  # debate failure (no creds, mailbox down, schema mismatch) skips the
  # trade AND queues an operator alert.
  entry_debate_enabled: true
  # Hard daily cap on debates. Exceeding this skips with reason
  # "skipped_entry_debate_over_cap" — raise the cap or tighten upstream
  # gates if you hit it consistently.
  entry_debate_daily_cap: 50
  # When the equity regime detector returns sideways/trending_down, allow
  # Momentum entries IF the per-ticker intel_score is at or above this
  # value. risk_off remains a hard wall regardless of intel score.
  # Empirically 5.0 is the score where ≥3 sources have rolled up in the
  # last 12h — i.e. a real news-driven event, not single-source noise.
  intel_score_regime_override_threshold: 5.0

# ───────────────────────── Phase B — Scout Debate ─────────────────────────
# Post-ingestion LLM committee that fires inside IntelIngestorRole after
# aggregator.roll_up(). Sequential 3-call chain (Skeptic → Analyst → Judge,
# all named expert personas). Per-symbol verdicts: 'elevate' (boost score)
# or 'dismiss' (filter from pool for TTL window). Fail-soft: any error
# leaves candidates unchanged (refuses to dismiss on LLM gate failure).
intel:
  scout_debate_enabled: true
  # Min IntelCandidate.score for a new (un-debated) candidate to enter
  # the scout brief. Below this is treated as routine noise.
  scout_debate_threshold: 3.0
  # Max candidates included per debate (cap LLM tokens / cost).
  scout_debate_batch_limit: 8
  # Max scout debates per day. ~48 ticks/day (30-min ingestor cadence)
  # gives one debate per tick under this cap.
  scout_debate_daily_cap: 48
  # Score multiplier applied on 'elevate' verdict.
  scout_elevate_boost: 1.5
  # How long a 'dismiss' verdict hides the symbol from the pool.
  # The symbol is re-debatable after this window expires.
  scout_dismiss_ttl_hours: 24

# ───────────────────────── Phase C — Hold Debate ─────────────────────────
# Position-level LLM committee that fires when intel decay or fresh adverse
# news suggests an entry thesis is breaking. Sequential 4-call chain
# (Position Trader → Risk Manager → Book Runner → Senior PM, all named
# expert personas). Verdicts: 'hold' (no action), 'tighten_stop' (replace
# stop at breakeven/swing-low), 'exit_now' (flatten via market order).
# Fail-soft: any error leaves bracket order untouched + queues operator
# alert. We NEVER auto-exit on infrastructure failure.
hold:
  hold_debate_enabled: true
  # Cheap SQL check cadence — drives PositionMonitorRole scheduling.
  cheap_check_interval_minutes: 15
  # Score-drop trigger: if current intel_score / entry_intel_score <=
  # (1 - this fraction), the score-drop trigger fires.
  hold_score_drop_threshold: 0.5      # 50% drop fires
  # Sentiment-flip trigger: entry_sentiment >= +X AND current <= -X fires.
  hold_sentiment_flip_threshold: 0.3
  # Negative-news cluster trigger: 3+ new negative events since entry.
  hold_negative_news_count_threshold: 3
  # Hard triggers: any fresh sec_8k or high-severity vip_tweet for the
  # held symbol fires the debate immediately, regardless of soft triggers.
  hold_8k_hard_trigger: true
  hold_vip_hard_trigger: true
  # Daily debate cap to bound LLM cost.
  hold_debate_daily_cap: 30

wheel:
  enabled: true  # paper-only (hardcoded URL prefix check); enabled 2026-04-29
  delta_target_low: 0.20
  delta_target_high: 0.30
  dte_min: 30
  dte_max: 45
  take_profit_pct: 0.50
  dte_force_close: 21
  delta_breach_csp: 0.45
  delta_breach_cc: 0.55
  max_rolls_per_cycle: 2
  iv_rank_floor: 0.0   # 2026-05-01: cold-start. Disabled until we have ~10d IV history; raise back to 30 once iv_rank is meaningful.
  vix_floor: 15.0
  vix_ceiling: 30.0
  sentiment_floor: -0.3
  min_premium_abs: 0.20
  min_annualized_yield: 0.12
  min_open_interest: 0   # 2026-05-01: Alpaca indicative feed returns 0 OI; raise back to 100 once we move to a paid options data feed.
  universe_cache_hours: 24
  # 2026-05-01: scout-curated allowlist mode. The wheel iterates the 6
  # names in strategy/wheel_allowlist.yaml only, skipping the 3000+ symbol
  # discovered universe. Flip back to false to restore broad scanning.
  allowlist_only: true
  # 2026-05-01: cold-start cap. Bot started capturing IV on 2026-04-29 so
  # most symbols have only 1-3 rows in option_iv_history. Lower the
  # iv_rank min_history to 2 so cold-start doesn't reject every candidate
  # with iv_rank=none. Raise to 5+ once we have ~2 weeks of history.
  iv_rank_min_history: 2
  # 2026-05-01: weekend/after-hours snapshots have wide quoted spreads.
  # Defaults (0.10 abs, 5% rel) are tuned for real-time market hours.
  # Loosen to capture testing data; tighten back in steady-state.
  liquidity_max_spread_abs: 1.50
  liquidity_max_spread_rel: 0.50
  # Phase 5: turn on the unblock committee so borderline risk-cap
  # rejections fire a 4-LLM debate that may override. Default-off in
  # code; explicit opt-in here to begin generating debate history.
  unblock_debate_enabled: true
